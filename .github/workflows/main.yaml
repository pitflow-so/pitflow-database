name: Pitflow Database

on:
  push:
    branches: ["main"]
    paths:
      - "infra/terraform/**"
      - "scripts/**"
      - ".github/workflows/main.yaml"
  workflow_dispatch:

concurrency:
  group: pitflow-database-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VAR_aws_region: "us-east-1"
  TF_VAR_secret_name: "pitflow/bootstrap"

jobs:
  deploy:
    name: Validate and create database resources
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.TF_VAR_aws_region }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Capture non-sensitive outputs
        id: database-outputs
        run: |
          echo "postgres_host=$(terraform output -raw postgres_host)" >> "$GITHUB_OUTPUT"
          echo "postgres_port=$(terraform output -raw postgres_port)" >> "$GITHUB_OUTPUT"
          echo "orchestrator_table_name=$(terraform output -raw orchestrator_table_name)" >> "$GITHUB_OUTPUT"
          echo "orchestrator_table_region=$(terraform output -raw orchestrator_table_region)" >> "$GITHUB_OUTPUT"

      - name: Install PostgreSQL client when needed
        working-directory: .
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi

      - name: Bootstrap logical PostgreSQL databases
        working-directory: .
        env:
          PITFLOW_SECRET_ID: ${{ env.TF_VAR_secret_name }}
          PITFLOW_POSTGRES_HOST: ${{ steps.database-outputs.outputs.postgres_host }}
          PITFLOW_POSTGRES_PORT: ${{ steps.database-outputs.outputs.postgres_port }}
        run: bash scripts/bootstrap-postgres.sh

      - name: Update dynamic database values in Secrets Manager
        working-directory: .
        env:
          PITFLOW_SECRET_ID: ${{ env.TF_VAR_secret_name }}
          POSTGRES_HOST: ${{ steps.database-outputs.outputs.postgres_host }}
          POSTGRES_PORT: ${{ steps.database-outputs.outputs.postgres_port }}
          ORCHESTRATOR_TABLE_NAME: ${{ steps.database-outputs.outputs.orchestrator_table_name }}
          ORCHESTRATOR_TABLE_REGION: ${{ steps.database-outputs.outputs.orchestrator_table_region }}
        run: |
          set -Eeuo pipefail
          current_secret="$RUNNER_TEMP/pitflow-secret-current.json"
          updated_secret="$RUNNER_TEMP/pitflow-secret-updated.json"
          trap 'rm -f "$current_secret" "$updated_secret"' EXIT

          aws secretsmanager get-secret-value \
            --secret-id "$PITFLOW_SECRET_ID" \
            --query SecretString \
            --output text > "$current_secret"

          jq \
            --arg host "$POSTGRES_HOST" \
            --arg port "$POSTGRES_PORT" \
            --arg table "$ORCHESTRATOR_TABLE_NAME" \
            --arg region "$ORCHESTRATOR_TABLE_REGION" \
            '.PITFLOW_OPERATION_DB_HOST = $host |
             .PITFLOW_OPERATION_DB_PORT = $port |
             .PITFLOW_INVENTORY_DB_HOST = $host |
             .PITFLOW_INVENTORY_DB_PORT = $port |
             .PITFLOW_REGISTRY_DB_HOST = $host |
             .PITFLOW_REGISTRY_DB_PORT = $port |
             .PITFLOW_PAYMENT_DB_HOST = $host |
             .PITFLOW_PAYMENT_DB_PORT = $port |
             .PITFLOW_ORCHESTRATOR_TABLE_NAME = $table |
             .PITFLOW_ORCHESTRATOR_AWS_REGION = $region' \
            "$current_secret" > "$updated_secret"

          aws secretsmanager put-secret-value \
            --secret-id "$PITFLOW_SECRET_ID" \
            --secret-string "file://$updated_secret" >/dev/null

          echo "Dynamic database configuration updated in Secrets Manager."
